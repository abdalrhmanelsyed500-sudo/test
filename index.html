<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ايجي تيوب - EgyTube | تحميل فيديوهات يوتيوب بجميع الجودات</title>
    <!-- الأنماط كما هي بدون تغيير (موجودة في الملف السابق) -->
    <style>
        /* ... نفس الـ CSS السابق بالكامل ... */
    </style>
</head>
<body>
    <!-- نفس الهيكل الأساسي للـ HTML -->

    <script>
        (function() {
            // ... نفس عناصر DOM والتعريفات ...

            // ============ قائمة خوادم Cobalt متعددة (رئيسي + احتياطي) ============
            const COBALT_SERVERS = [
                'https://api.cobalt.tools/api/json',
                'https://co.wuk.sh/api/json',
                'https://cobalt-api.kyun.li/api/json',
                'https://cobalt-api.hyper.lol/api/json',
                'https://cobalt.ir/api/json',
                'https://api.cobalt.best/api/json'
            ];

            // ============ دالة جلب الرابط مع التبديل التلقائي ============
            async function fetchDownloadUrl(videoId, qualityDef) {
                const body = {
                    url: `https://www.youtube.com/watch?v=${videoId}`,
                };
                if (qualityDef.isAudio) {
                    body.isAudioOnly = true;
                    body.aFormat = 'mp3';
                } else {
                    body.vQuality = qualityDef.vQuality;
                    body.aFormat = 'mp3';
                }

                // نجرب الخوادم واحداً تلو الآخر
                for (const serverUrl of COBALT_SERVERS) {
                    try {
                        const response = await fetch(serverUrl, {
                            method: 'POST',
                            headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' },
                            body: JSON.stringify(body),
                            signal: AbortSignal.timeout(12000) // 12 ثانية مهلة
                        });

                        if (!response.ok) continue; // جرب التالي

                        const data = await response.json();
                        if (data.status === 'error' || !data.url) continue;

                        return { url: data.url, filename: data.filename || `video_${videoId}.mp4` };
                    } catch (e) {
                        continue; // فشل الاتصال بهذا الخادم، جرب التالي
                    }
                }

                throw new Error('تعذر الاتصال بأي خادم تحميل. قد تكون الخدمة معطلة أو محظورة.');
            }

            // ============ دالة اختبار الاتصال عند بدء الموقع ============
            async function testApiConnection() {
                try {
                    const testRes = await fetch('https://api.cobalt.tools/', { signal: AbortSignal.timeout(5000) });
                    if (testRes.ok) {
                        console.log('✅ اتصال API ناجح');
                    }
                } catch (e) {
                    console.warn('⚠️ خادم Cobalt الرئيسي لا يستجيب. سيتم تجربة بدائل.');
                }
            }
            testApiConnection();

            // ... باقي الدوال (extractYouTubeId, fetchVideoMetadata, renderQualityCards, إلخ) تظل كما هي ...
            // مع التأكد من استدعاء fetchDownloadUrl الجديدة داخل handleQualitySelect

            // تعديل handleQualitySelect لاستخدام fetchDownloadUrl الجديدة
            async function handleQualitySelect(qualityDef, cardElement) {
                document.querySelectorAll('.quality-card.selected').forEach(c => c.classList.remove('selected'));
                document.querySelectorAll('.quality-card.fetching').forEach(c => c.classList.remove('fetching'));
                cardElement.classList.add('selected', 'fetching');
                currentSelectedQuality = qualityDef;
                downloadActionArea.classList.remove('visible');
                currentDownloadUrl = null;

                try {
                    const result = await fetchDownloadUrl(currentVideoId, qualityDef);
                    currentDownloadUrl = result.url;
                    finalDownloadBtn.href = result.url;
                    finalDownloadBtn.setAttribute('download', result.filename);
                    downloadActionArea.classList.add('visible');
                    cardElement.classList.remove('fetching');
                    showToast(`✅ جاهز! جودة ${qualityDef.label}`, 'success');
                } catch (err) {
                    cardElement.classList.remove('fetching', 'selected');
                    currentSelectedQuality = null;
                    currentDownloadUrl = null;
                    console.error('Download error:', err);
                    // رسالة خطأ مفصلة
                    showToast('⚠️ ' + (err.message || 'تعذر تجهيز الجودة. تحقق من اتصالك أو جرب لاحقاً.'), 'error');
                }
            }

            // ... باقي الشيفرة كما هي ...

        })();
    </script>
</body>
</html>
